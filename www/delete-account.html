<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    color: #2d2640;

  }
  .header {
    background: linear-gradient(135deg, #7c5cbf, #b49de0);

    color: #fff;
  }
  .header .icon { font-size: 40px; margin-bottom: 10px; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header .sub { font-size: 13px; opacity: 0.85; }
  .lang-switch {

  }
  .lang-btn {
    padding: 6px 18px; border-radius: 20px; border: none; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 600; transition: all .2s;
  }
  .lang-btn.active { background: #fff; color: #7c5cbf; }
  .lang-btn.inactive { background: rgba(255,255,255,0.2); color: #fff; border: 1.5px solid rgba(255,255,255,0.4); }

  .container { max-width: 600px; margin: 0 auto; padding: 24px 16px 48px; }

  .updated { font-size: 12px; color: #a89ec8; text-align: center; margin-bottom: 20px; }

  .section {
    background: #fff; border-radius: 18px;
    padding: 20px 18px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(124,92,191,0.07);
  }
  .section-title {
    font-size: 15px; font-weight: 700; color: #7c5cbf;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .section p {
    font-size: 13.5px; color: #4a4060; line-height: 1.9;
  }
  .item {

    border-bottom: 1px solid #f0ecfa;
    font-size: 13.5px; color: #4a4060; line-height: 1.8;
  }
  .item:last-child { border-bottom: none; padding-bottom: 0; }
  .bullet { color: #7c5cbf; font-size: 16px; flex-shrink: 0; }

  .step {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid #f0ecfa;
    align-items: flex-start;
  }
  .step:last-child { border-bottom: none; padding-bottom: 0; }
  .step-num {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    background: #7c5cbf; color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text { font-size: 13.5px; color: #4a4060; line-height: 1.8; }
  .step-text strong { color: #2d2640; }

    background: #fdf2f5; border: 1px solid #f6d8e2; border-radius: 14px;

  .contact-icon { font-size: 18px; width: 24px; text-align: center; }

    background: linear-gradient(135deg, #7c5cbf, #b49de0);
    color: #fff; border: none; border-radius: 14px;

    font-family: inherit; margin-top: 8px; text-align: center;

function setLang(lang) {
  const d = CONTENT[lang];
  Object.keys(d).forEach(id => {
    const el = document.getElementById(id);
    if(el) el.innerHTML = d[id];
  });
  document.getElementById('btnZh').className = 'lang-btn ' + (lang==='zh' ? 'active' : 'inactive');
  document.getElementById('btnTh').className = 'lang-btn ' + (lang==='th' ? 'active' : 'inactive');
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'th';
  localStorage.setItem('luna_lang', lang);
}

const savedLang = localStorage.getItem('luna_lang') || 'th';
