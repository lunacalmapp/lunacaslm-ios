<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="google" content="notranslate">
<title>Luna · Help</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans Thai', 'Segoe UI', sans-serif;
    background: #f4f2f9;
    color: #2d2640;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #7c5cbf, #b49de0);
    padding: 48px 20px 28px;
    text-align: center;
    color: #fff;
    position: relative;
  }
  .header .icon { font-size: 40px; margin-bottom: 10px; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header .sub { font-size: 13px; opacity: 0.85; }
  .lang-switch { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
  .lang-btn {
    padding: 6px 18px; border-radius: 20px; border: none; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 600; transition: all .2s;
  }
  .lang-btn.active { background: #fff; color: #7c5cbf; }
  .lang-btn.inactive { background: rgba(255,255,255,0.2); color: #fff; border: 1.5px solid rgba(255,255,255,0.4); }

  .container { max-width: 600px; margin: 0 auto; padding: 24px 16px 48px; }

  .section {
    background: #fff; border-radius: 18px;
    padding: 20px 18px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(124,92,191,0.07);
  }
  .section-title {
    font-size: 15px; font-weight: 700; color: #7c5cbf;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
  }
  .faq-q {
    font-size: 14px; font-weight: 700; color: #2d2640;
    margin-top: 16px; margin-bottom: 5px;
  }
  .faq-q:first-of-type { margin-top: 8px; }
  .faq-a {
    font-size: 13.5px; color: #4a4060; line-height: 1.85;
  }
  .step {
    display: flex; gap: 10px; padding: 9px 0;
    border-bottom: 1px solid #f0ecfa;
    font-size: 13.5px; color: #4a4060; line-height: 1.7;
  }
  .step:last-child { border-bottom: none; padding-bottom: 0; }
  .step-num {
    color: #7c5cbf; font-weight: 700; flex-shrink: 0;
  }
  .contact-box {
    background: linear-gradient(135deg, #faf6ff, #fff0fa);
    border: 1px solid #ecdcff; border-radius: 14px;
    padding: 16px; text-align: center; margin-top: 4px;
  }
  .line-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #06C755, #05a948);
    color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
    padding: 11px 24px; border-radius: 13px; margin-top: 10px;
    box-shadow: 0 4px 14px rgba(6,199,85,0.3);
  }
  .back-btn {
    display: block; width: 100%; padding: 14px;
    background: #fff; border: 1.5px solid #e0dcea; border-radius: 14px;
    color: #7c5cbf; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="icon">🌙</div>
    <h1 id="pageTitle">ความช่วยเหลือ</h1>
    <div class="sub" id="pageSubtitle">Luna · คำถามที่พบบ่อย</div>
    <div class="lang-switch">
      <button class="lang-btn active" id="btnTh" onclick="setLang('th')">ไทย</button>
      <button class="lang-btn inactive" id="btnZh" onclick="setLang('zh')">中文</button>
    </div>
    <button onclick="goBack()" aria-label="close" style="position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:50%; border:none; background:rgba(255,255,255,0.25); color:#fff; font-size:18px; cursor:pointer; font-family:inherit; line-height:1; display:flex; align-items:center; justify-content:center;">✕</button>
  </div>

  <div class="container">
    <!-- FAQ -->
    <div class="section">
      <div class="section-title">💬 <span id="faqTitle">คำถามที่พบบ่อย</span></div>
      <div class="faq-q" id="q1"></div><div class="faq-a" id="a1"></div>
      <div class="faq-q" id="q2"></div><div class="faq-a" id="a2"></div>
      <div class="faq-q" id="q3"></div><div class="faq-a" id="a3"></div>
      <div class="faq-q" id="q4"></div><div class="faq-a" id="a4"></div>
      <div class="faq-q" id="q5"></div><div class="faq-a" id="a5"></div>
      <div class="faq-q" id="q6"></div><div class="faq-a" id="a6"></div>
      <div class="faq-q" id="q7"></div><div class="faq-a" id="a7"></div>
    </div>

    <!-- 使用教程 -->
    <div class="section">
      <div class="section-title">📖 <span id="guideTitle">วิธีใช้งาน</span></div>
      <div class="step"><span class="step-num">1.</span><span id="g1"></span></div>
      <div class="step"><span class="step-num">2.</span><span id="g2"></span></div>
      <div class="step"><span class="step-num">3.</span><span id="g3"></span></div>
      <div class="step"><span class="step-num">4.</span><span id="g4"></span></div>
    </div>

    <!-- 联系 -->
    <div class="section">
      <div class="section-title">🤝 <span id="contactTitle">ยังมีคำถาม?</span></div>
      <div class="contact-box">
        <div class="faq-a" id="contactBody"></div>
        <a class="line-btn" href="https://lin.ee/YkXqAQk" target="_blank" rel="noopener">💬 <span id="lineBtnTxt">ติดต่อทาง LINE</span></a>
      </div>
    </div>

    <button class="back-btn" id="backBtn" onclick="goBack()">← กลับ</button>
  </div>

<script>
function goBack() { location.href = '/'; }

const CONTENT = {
  th: {
    pageTitle: 'ความช่วยเหลือ',
    pageSubtitle: 'Luna · คำถามที่พบบ่อย',
    faqTitle: 'คำถามที่พบบ่อย',
    q1: '❓ สมัครสมาชิก VIP อย่างไร?',
    a1: 'กดที่การ์ดสมาชิกในหน้า "โปรไฟล์" แล้วติดต่อทาง LINE แอดมินจะแจ้งวิธีชำระเงิน (รายเดือน 79 บาท / รายปี 599 บาท)',
    q2: '❓ ชำระเงินแล้วเปิดใช้งานเมื่อไร?',
    a2: 'หลังจากส่งสลิปและอีเมลที่ล็อกอินมาทาง LINE แอดมินจะเปิดใช้งานให้ภายใน 24 ชั่วโมง',
    q3: '❓ เปลี่ยนเครื่อง/ล็อกอินใหม่ ข้อมูลยังอยู่ไหม?',
    a3: 'อยู่ครบค่ะ เพียงล็อกอินด้วยบัญชี Google เดิม ข้อมูลทั้งหมด (รอบเดือน อาการ บันทึก) จะซิงค์กลับมาโดยอัตโนมัติ',
    q4: '❓ ถ้าล็อกอินด้วยบัญชี Google คนละบัญชีจะเป็นอย่างไร?',
    a4: 'ข้อมูลจะผูกกับบัญชี Google แต่ละบัญชีแยกกัน หากล็อกอินด้วยบัญชีอื่น จะไม่เห็นข้อมูลของบัญชีเดิม โปรดใช้บัญชี Google เดิมเสมอ',
    q5: '❓ ขอคืนเงินได้ไหม?',
    a5: 'มีช่วงทดลองใช้ฟรี 14 วัน กรุณาทดลองให้พอใจก่อนสมัคร เงื่อนไขการคืนเงินดูได้ที่หน้า "ข้อกำหนดการใช้งาน"',
    q6: '❓ ทดลองใช้ได้กี่วัน? หมดแล้วข้อมูลหายไหม?',
    a6: 'ทดลองใช้ฟรี 14 วัน เมื่อหมดช่วงทดลอง ข้อมูลที่บันทึกไว้ยังอยู่ครบ เพียงแต่จะบันทึกเพิ่มไม่ได้จนกว่าจะสมัครสมาชิก',
    q7: '❓ มีธีมให้เลือกกี่แบบ?',
    a7: 'สมาชิก VIP ปลดล็อกได้ทั้งหมด 7 ธีม และช่วงทดลองใช้ก็สามารถลองเปลี่ยนธีมได้ทุกแบบ',
    guideTitle: 'วิธีใช้งานเบื้องต้น',
    g1: 'บันทึกรอบเดือน: ไปที่ "ปฏิทิน" แล้วแตะวันที่เพื่อทำเครื่องหมายวันมีประจำเดือน',
    g2: 'ดูการพยากรณ์และสถิติ: หน้าแรกจะแสดงวันรอบเดือนถัดไป กดที่ "สถิติ" เพื่อดูแนวโน้ม',
    g3: 'เปลี่ยนธีม: ไปที่ "โปรไฟล์" เลื่อนหาส่วนธีม แล้วเลือกสีที่ชอบ',
    g4: 'ลูกบอลลอย 🌙: แตะเพื่อรับข้อความให้กำลังใจประจำวัน',
    contactTitle: 'ยังมีคำถาม?',
    contactBody: 'หากยังไม่พบคำตอบ หรือมีปัญหาการใช้งาน ติดต่อแอดมินได้ทาง LINE (ตอบกลับ 9:00–21:00 น.)',
    lineBtnTxt: 'ติดต่อทาง LINE',
    backBtn: '← กลับ',
  },
  zh: {
    pageTitle: '帮助中心',
    pageSubtitle: 'Luna · 常见问题',
    faqTitle: '常见问题',
    q1: '❓ 如何开通 VIP 会员?',
    a1: '在「我的」页点击会员卡片,通过 LINE 联系管理员,会告知付款方式(月卡 79 泰铢 / 年卡 599 泰铢)。',
    q2: '❓ 付款后多久开通?',
    a2: '在 LINE 发送转账截图和登录邮箱后,管理员会在 24 小时内为你开通。',
    q3: '❓ 换手机/重新登录,数据还在吗?',
    a3: '都在。只要用同一个 Google 账号登录,所有数据(经期、症状、记录)会自动同步回来。',
    q4: '❓ 用不同的 Google 账号登录会怎样?',
    a4: '数据是和每个 Google 账号分开绑定的。用别的账号登录会看不到原账号的数据,请始终使用同一个 Google 账号。',
    q5: '❓ 可以退款吗?',
    a5: '有 14 天免费试用,请试用满意后再开通。退款条件详见「使用条款」页面。',
    q6: '❓ 试用多少天?到期后记录还在吗?',
    a6: '免费试用 14 天。试用到期后,已记录的数据全部保留,只是暂时无法继续新增记录,开通会员即可恢复。',
    q7: '❓ 有几个主题可选?',
    a7: 'VIP 会员可解锁全部 7 个主题,试用期内也能体验全部主题。',
    guideTitle: '使用教程',
    g1: '记录经期:进入「日历」,点击日期标记经期。',
    g2: '查看预测和统计:首页会显示下次经期,点「统计」查看趋势。',
    g3: '更换主题:进入「我的」,找到主题部分,选择喜欢的颜色。',
    g4: '悬浮球 🌙:点击它获取每日鼓励寄语。',
    contactTitle: '还有问题?',
    contactBody: '如果没找到答案,或使用中遇到问题,可通过 LINE 联系管理员(回复时间 9:00–21:00)。',
    lineBtnTxt: '通过 LINE 联系',
    backBtn: '← 返回',
  }
};

function setLang(lang) {
  const d = CONTENT[lang];
  for (const key in d) {
    const el = document.getElementById(key);
    if (el) el.innerHTML = d[key];
  }
  document.documentElement.lang = lang;
  document.getElementById('btnTh').className = 'lang-btn ' + (lang === 'th' ? 'active' : 'inactive');
  document.getElementById('btnZh').className = 'lang-btn ' + (lang === 'zh' ? 'active' : 'inactive');
}

// 默认跟随 URL 参数 ?lang=zh，否则泰语
const urlLang = new URLSearchParams(location.search).get('lang');
setLang(urlLang === 'zh' ? 'zh' : 'th');
</script>
</body>
</html>
